<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>404 Page</title>

<!-- GOOGLE FONT -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<!-- FONT AWESOME -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */

body{

  font-family:'Poppins',sans-serif;

  min-height:100vh;

  display:flex;

  justify-content:center;
  align-items:center;

  overflow:hidden;

  padding:20px;

  background:
  linear-gradient(
  135deg,
  rgba(2,6,23,0.96),
  rgba(15,23,42,0.92),
  rgba(17,24,39,0.92)
  );
}

/* CONTAINER */

.error-container{

  width:100%;
  max-width:750px;

  padding:50px 30px;

  text-align:center;
}

/* 404 NUMBER */

.error-code{

  font-size:clamp(70px,14vw,170px);

  font-weight:800;

  line-height:1;

  margin-bottom:15px;

  background:
  linear-gradient(
  to right,
  #ff00ff,
  #7c3aed,
  #38bdf8
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;

  filter:
  drop-shadow(0 0 20px rgba(56,189,248,0.28));
}

/* TITLE */

.error-title{

  font-size:clamp(24px,4vw,55px);

  color:white;

  font-weight:700;

  margin-bottom:18px;
}

/* TEXT */

.error-text{

  max-width:580px;

  margin:auto;

  color:rgba(255,255,255,0.65);

  line-height:1.8;

  font-size:15px;

  margin-bottom:35px;
}

/* BUTTON AREA */

.error-buttons{

  display:flex;

  justify-content:center;

  gap:18px;

  flex-wrap:wrap;
}

/* BUTTON */

.btn{

  padding:14px 30px;

  border-radius:50px;

  text-decoration:none;

  font-size:15px;

  font-weight:600;

  display:flex;

  align-items:center;

  gap:10px;

  transition:0.35s ease;
}

/* PRIMARY BUTTON */

.btn-primary{

  background:
  linear-gradient(
  135deg,
  #7c3aed,
  #00c2ff
  );

  color:white;

  box-shadow:
  0 0 20px rgba(56,189,248,0.22);
}

.btn-primary:hover{

  transform:
  translateY(-4px)
  scale(1.02);
}

/* RESPONSIVE */

@media(max-width:768px){

  .error-container{

    padding:40px 18px;
  }

  .error-text{

    font-size:13px;
  }

  .btn{

    padding:12px 24px;

    font-size:14px;

    justify-content:center;
  }

}

</style>

</head>

<body>

<!-- CONTAINER -->

<div class="error-container">

  <!-- 404 -->

  <h1 class="error-code">
    404
  </h1>

  <!-- TITLE -->

  <h2 class="error-title">
    Oops! Page Not Found
  </h2>

  <!-- TEXT -->

  <p class="error-text">

    The page you are looking for might have been removed,
    renamed, or is temporarily unavailable.

  </p>

  <!-- BUTTON -->

  <div class="error-buttons">

    <a href="index.html"
    class="btn btn-primary">

      <i class="fa-solid fa-house"></i>

      Back To Home

    </a>

  </div>

</div>

</body>

</html>
